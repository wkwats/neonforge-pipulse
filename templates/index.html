<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeonForge PiPulse — Sensor Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #06070d;
      --card: rgba(19, 21, 35, 0.72);
      --text: #e9ecff;
      --muted: #97a0c3;
      --accent: #65f3ff;
      --accent2: #9b5dff;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #1c1540 0%, transparent 35%),
        radial-gradient(circle at 80% 0%, #11355f 0%, transparent 30%),
        radial-gradient(circle at 80% 85%, #2a1148 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 1300px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(1.4rem, 2.5vw, 2.2rem); text-shadow: 0 0 24px rgba(101,243,255,.35); }
    .sub { color: var(--muted); margin-top: 4px; }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      color: #d7dbff;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 40px;
      margin-left: auto;
    }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(12, 1fr); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
    .stats { grid-column: span 12; }
    .chart { grid-column: span 8; min-height: 320px; }
    .list { grid-column: span 4; min-height: 320px; }
    @media (max-width: 980px) { .chart, .list { grid-column: span 12; } }
    .title { margin: 0 0 12px; }
    .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .sensor { border: 1px solid var(--border); border-radius: 12px; padding: 10px; cursor: pointer; }
    .sensor:hover { border-color: rgba(101,243,255,.5); }
    .sensor.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(101,243,255,.35) inset; }
    .tiny { color: var(--muted); font-size: .84rem; }
    #sensorList { display: grid; gap: 8px; max-height: 360px; overflow: auto; }
    .row { border-bottom: 1px dashed rgba(255,255,255,.1); padding-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>🏠 NeonForge PiPulse</h1>
        <div class="sub">Home sensor dashboard</div>
      </div>
      <div class="badge" id="liveBadge">Loading…</div>
    </div>

    <div class="grid">
      <div class="card stats">
        <h3 class="title">Latest Sensor Readings</h3>
        <div id="cards" class="sensor-grid"></div>
      </div>

      <div class="card chart">
        <h3 class="title" id="chartTitle">Trend</h3>
        <canvas id="historyChart"></canvas>
      </div>

      <div class="card list">
        <h3 class="title">Sensors</h3>
        <div id="sensorList"></div>
      </div>
    </div>
  </div>

<script>
  const badge = document.getElementById('liveBadge');
  const cardsEl = document.getElementById('cards');
  const listEl = document.getElementById('sensorList');
  const chartTitle = document.getElementById('chartTitle');

  let selected = null;

  const chart = new Chart(document.getElementById('historyChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Value', data: [], borderColor: '#65f3ff', backgroundColor: 'rgba(101,243,255,.12)', fill: true, tension: 0.35 }] },
    options: {
      animation: false,
      scales: {
        x: { ticks: { color: '#9da6c9' }, grid: { color: 'rgba(255,255,255,.05)' } },
        y: { ticks: { color: '#9da6c9' }, grid: { color: 'rgba(255,255,255,.07)' } }
      },
      plugins: { legend: { labels: { color: '#cfd6ff' } } }
    }
  });

  function sensorKey(item) {
    return `${item.sensor_id}::${item.metric}`;
  }

  function formatPrettyDateTime(input) {
    const d = new Date(input);
    if (Number.isNaN(d.getTime())) return input;

    const day = d.getDate();
    const suffix = (n) => {
      if (n >= 11 && n <= 13) return 'th';
      const last = n % 10;
      if (last === 1) return 'st';
      if (last === 2) return 'nd';
      if (last === 3) return 'rd';
      return 'th';
    };

    const month = d.toLocaleString('en-US', { month: 'short' });
    const year = d.getFullYear();
    const time = d.toLocaleString('en-US', {
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    }).toLowerCase();

    return `${month} ${day}${suffix(day)} ${year} ${time}`;
  }

  function renderLatest(items) {
    cardsEl.innerHTML = '';
    listEl.innerHTML = '';

    if (!items.length) {
      cardsEl.innerHTML = '<div class="tiny">No sensor data yet. Post readings to /api/ingest.</div>';
      return;
    }

    items.forEach(item => {
      const key = sensorKey(item);

      const card = document.createElement('div');
      card.className = `sensor ${selected === key ? 'active' : ''}`;
      card.innerHTML = `
        <div><strong>${item.metric}</strong></div>
        <div style="font-size:1.4rem;margin:4px 0;">${item.value} ${item.unit || ''}</div>
        <div class="tiny">${item.sensor_id}${item.location ? ` • ${item.location}` : ''}</div>
      `;
      card.onclick = () => pick(item);
      cardsEl.appendChild(card);

      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `<div><strong>${item.sensor_id}</strong> • ${item.metric}</div><div class="tiny">${item.recorded_at_pretty || formatPrettyDateTime(item.recorded_at)}</div>`;
      row.onclick = () => pick(item);
      listEl.appendChild(row);
    });
  }

  async function pick(item) {
    selected = sensorKey(item);
    renderLatest(window.__latestItems || []);
    chartTitle.textContent = `${item.sensor_id} • ${item.metric} (last 6h)`;

    const res = await fetch(`/api/sensors/history?sensor_id=${encodeURIComponent(item.sensor_id)}&metric=${encodeURIComponent(item.metric)}&minutes=360`);
    const data = await res.json();

    chart.data.labels = data.points.map(p => new Date(p.recorded_at).toLocaleTimeString());
    chart.data.datasets[0].data = data.points.map(p => p.value);
    chart.update();
  }

  async function refresh() {
    try {
      const res = await fetch('/api/sensors/latest', { cache: 'no-store' });
      const data = await res.json();
      window.__latestItems = data.items || [];
      renderLatest(window.__latestItems);

      badge.textContent = `LIVE • ${data.count} metrics • ${data.now_pretty || formatPrettyDateTime(data.now)}`;

      if (!selected && window.__latestItems.length) {
        await pick(window.__latestItems[0]);
      }
    } catch (e) {
      badge.textContent = 'Disconnected';
    }
  }

  refresh();
  setInterval(refresh, 4000);
</script>
</body>
</html>
